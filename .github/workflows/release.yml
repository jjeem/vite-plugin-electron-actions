name: Release

on:
  workflow_run:
    workflows: [CI]
    branches: [release]
    types: [completed]

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for OIDC

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Read version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          NPM_TAG="$(node -p "const version = require('./package.json').version; const match = version.match(/^[^-]+-([0-9A-Za-z-]+)/); match ? match[1] : 'latest'")"

          echo "value=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"
          if [ "$NPM_TAG" = "latest" ]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: pnpm publish --tag "${{ steps.version.outputs.npm_tag }}" --provenance --no-git-checks --access public

      - name: Create GitHub Release
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ steps.version.outputs.is_prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create ${{ steps.version.outputs.value }} \
            $PRERELEASE_FLAG \
            --target "${{ github.event.workflow_run.head_sha }}" \
            --title "${{ steps.version.outputs.value }}" \
            --generate-notes \
            --verify-tag=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
